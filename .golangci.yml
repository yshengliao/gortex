# golangci-lint configuration (v2 schema)
# https://golangci-lint.run/usage/configuration/
#
# This config is intentionally focused on bug-catching linters so the CI gate
# stays green and meaningful. Heavier style/complexity linters (revive,
# gocritic, dupl, goconst, mnd, gocyclo, ...) can be layered back in
# incrementally once their findings are triaged.
version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  # "standard" enables errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    - bodyclose      # HTTP response bodies must be closed (resource leaks)
    - gosec          # security issues
    - noctx          # HTTP requests should carry a context

  settings:
    govet:
      enable:
        - shadow
    staticcheck:
      # Focus on the bug (SA*) and simplification (S1*) checks; the stylistic
      # (ST*) and refactor-suggestion (QF*) groups are intentionally off so the
      # gate flags correctness issues rather than naming/comment preferences.
      checks:
        - SA*
        - S1*
    gosec:
      excludes:
        # G115 (integer overflow on conversion) is noisy and every hit here is
        # a benign, well-bounded conversion (e.g. time.UnixNano int64<->uint64).
        - G115

  exclusions:
    generated: lax
    rules:
      # Test files exercise edge cases and intentionally ignore some errors.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - noctx
          - bodyclose
      # Shared test utilities.
      - path: internal/testutil/
        linters:
          - gosec
      # Benchmarks.
      - path: _bench_test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/yshengliao/gortex

issues:
  # Report every finding (no per-linter or duplicate-text caps) so CI fails
  # loudly rather than hiding repeated issues behind a display limit.
  max-issues-per-linter: 0
  max-same-issues: 0
